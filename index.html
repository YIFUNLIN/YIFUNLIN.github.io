<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你好，GitHub - 个人介绍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>你好，我是[你的名字]</h1>
        <p>一名热情的数据科学家</p>
    </header>
    <nav>
        <ul>
            <li><a href="#about">关于我</a></li>
            <li><a href="#skills">技能</a></li>
            <li><a href="#projects">项目</a></li>
            <li><a href="#contact">联系方式</a></li>
        </ul>
    </nav>
    <section id="about">
        <h2>关于我</h2>
        <p>这里写上你的介绍，包括你的背景、兴趣和你为什么对数据科学感兴趣。</p>
    </section>
    <section id="skills">
        <h2>技能</h2>
        <ul>
            <li>Python</li>
            <li>R</li>
            <li>机器学习</li>
            <li>数据可视化</li>
            <!-- 添加更多技能 -->
        </ul>
    </section>
    <section id="projects">
        <h2>项目</h2>
        <p>简述你的项目，包括项目名称、使用的技术、你的贡献、以及项目成果。</p>
        <!-- 为每个项目添加详细描述 -->
    </section>
    <section id="contact">
        <h2>联系方式</h2>
        <p>将你的 LinkedIn、GitHub 以及电子邮件地址列在这里。</p>
    </section>
    <footer>
        <p>&copy; 2024 [你的名字]. All rights reserved.</p>
    </footer>
</body>
</html>
