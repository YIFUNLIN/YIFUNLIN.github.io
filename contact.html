<h2 class="major">Contact</h2>
<form method="post" action="https://formspree.io/f/meoenwoy">
  <div class="fields">
    <div class="field half">
      <label for="name">Name</label>
      <input type="text" name="name" id="name" required="required" />
    </div>
    <div class="field half">
      <label for="email">Email</label>
      <input type="email" name="email" id="email" required="required" />
    </div>
    <div class="field half">
      <label for="phone">Phone Number</label>
      <input type="tel" name="phone" id="phone" required />
    </div>
    <div class="field half">
      <label for="birth">Birthday</label>
      <input type="date" name="birth" required="required" />
    </div>
    <div class="field half">
      <label for="work_school">Work/School</label>
      <input type="text" name="work_school" id="work_school" required="required" />
    </div>
    <div class="field half">
      <label for="social_media">Social media link</label>
      <input type="text" name="social_media" id="social_media" required="required" placeholder="ex. Linkedin, Github, Instagram .." />
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea name="message" id="message" rows="4"></textarea>
    </div>
  </div>
  <ul class="actions">
    <li><input type="submit" value="Send Message" class="primary" /></li>
    <li><input type="reset" value="Reset" /></li>
  </ul>
</form>
